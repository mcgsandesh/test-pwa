<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KV Society PWA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2196F3">

    <style>
    body, html { 
        margin: 0; 
        padding: 0; 
        height: 100vh; 
        width: 100vw; 
        display: flex; 
        flex-direction: column; /* हे महत्वाचे आहे: बार वर आणि आयफ्रेम खाली */
        overflow: hidden; 
        background-color: #ffffff; 
    }

    #notif-bar { 
        background: #2196F3; 
        color: white; 
        text-align: center; 
        padding: 12px; 
        font-family: 'Segoe UI', Tahoma, sans-serif; 
        display: none; /* गरजेनुसार जाणीवपूर्वक दिसेल */
        width: 100%; 
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        flex-shrink: 0; /* बार दबला जाऊ नये म्हणून */
    }

    #notif-bar button { 
        margin-left: 10px; 
        padding: 6px 15px; 
        border-radius: 4px; 
        border: none; 
        cursor: pointer; 
        font-weight: bold; 
        background: white; 
        color: #2196F3; 
    }

    /* आयफ्रेम आता उरलेली सर्व जागा घेईल */
    #app-iframe { 
        flex-grow: 1; 
        width: 100%; 
        border: none; 
    }
</style>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-messaging.js"></script>
</head>
<body>

<div id="notif-bar">
    🔔 सोसायटी अपडेट्स मिळवण्यासाठी <button onclick="askNotification()">Allow</button>
</div>
    
<iframe id="app-iframe" src="https://script.google.com/macros/s/AKfycbxz_apAe1hrJ4VZqi0u1uAdTTGnAPRZZ5POL4h7B8gUz8U4WcE9CX3c-027php-33Y50A/exec"></iframe> 

<script>
  // १. तुमचा फायरबेस कॉन्फिग
  var firebaseConfig = {
       apiKey: "AIzaSyBfDsCvNBb6SVhz0Z8P5p3s5jIGVZQYTPc",
    authDomain: "kv-digital-society.firebaseapp.com",
    projectId: "kv-digital-society",
    storageBucket: "kv-digital-society.firebasestorage.app",
    messagingSenderId: "524643551701",
    appId: "1:524643551701:web:4f32cc6dc24b9bb48c155c",
    measurementId: "G-QPNLYDJ7FZ"
  };

  firebase.initializeApp(firebaseConfig);
  const messaging = firebase.messaging();

 function askNotification() {
  // १. परवानगी मागणे
  Notification.requestPermission().then(permission => {
    if (permission === 'granted') {
      
      // लोडिंग सुरुवातीला न दाखवता, आपण फक्त 'Status' बदलूया
      const bar = document.getElementById('notif-bar');
      bar.innerHTML = "⏳ टोकन मिळवत आहे, कृपया थांबा...";

      navigator.serviceWorker.register('firebase-messaging-sw.js')
        .then(reg => {
          // सर्विस वर्कर रेडी असल्याची खात्री
          return navigator.serviceWorker.ready;
        })
        .then(readyReg => {
          // २. टोकन मिळवणे (इथेच वेळ लागू शकतो)
          return messaging.getToken({ 
            vapidKey: 'BG1NQMsKIT6Kf4zKRPazypj-q-CGL0XUqzVwDp6EGmsVxR5W7e1T91Bi3rRcbN8oGCUbcEJqpW23BSrOXJskOCQ', // की बरोबर असल्याची खात्री करा
            serviceWorkerRegistration: readyReg 
          });
        })
        .then(fcmToken => {
          if (fcmToken) {
            console.log("✅ टोकन मिळाला!");
            
            // ३. आता रिडायरेक्ट करा
            const scriptURL = "https://script.google.com/macros/s/AKfycbxz_apAe1hrJ4VZqi0u1uAdTTGnAPRZZ5POL4h7B8gUz8U4WcE9CX3c-027php-33Y50A/exec";
            const finalURL = `${scriptURL}?action=registerFCM&fcmToken=${fcmToken}`;
            
            // SweetAlert फक्त रिडायरेक्टच्या वेळी दाखवूया
            Swal.fire({
              title: 'प्रक्रिया पूर्ण!',
              text: 'आता आपण मुख्य पेजवर जात आहोत.',
              icon: 'success',
              timer: 2000,
              showConfirmButton: false
            });

            const iframe = document.querySelector('iframe');
            if (iframe) { iframe.src = finalURL; }
          }
        })
        .catch(err => {
          console.error("❌ एरर:", err);
          alert("काहीतरी चुकले: " + err.message);
          bar.innerHTML = "❌ एरर आली आहे. कृपया पेज रिफ्रेश करा.";
        });
    }
  });
}

// बटण लपवण्यासाठी साधे लॉजिक (onload मध्ये)
window.onload = function() {
  if (Notification.permission === 'granted') {
    document.getElementById('notif-bar').style.display = 'none';
  } else {
    document.getElementById('notif-bar').style.display = 'block';
  }
};

  // २. नोटिफिकेशन बार दाखवण्याचे लॉजिक
  window.onload = function() {
    const isRegistered = localStorage.getItem("notif_registered_user");
    
    // जर परवानगी नसेल किंवा या युजरने अजून रजिस्टर केले नसेल तरच बार दाखवा
    if (Notification.permission !== 'granted' || isRegistered !== "true") {
      document.getElementById('notif-bar').style.display = 'block';
    }
  };

  // ३. आयफ्रेम कडून येणारे मेसेजेस ऐकणे (उदा. Logout झाल्यावर)
  window.addEventListener("message", function(event) {
    if (event.data && event.data.type === 'SOCIETY_APP_LOGOUT') {
      localStorage.removeItem("notif_registered_user");
      console.log("🗑️ Notification status cleared due to logout");
    }
  }, false);

</script>
</body>
</html>
