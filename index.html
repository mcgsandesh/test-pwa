<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KV Society PWA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2196F3">
    <style>
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; background-color: #ffffff; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
    <!-- Firebase SDK (GitHub स्तरावर लोड करणे आवश्यक आहे) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-messaging.js"></script>
</head>
<body>
   <iframe src="https://script.google.com/macros/s/AKfycbxz_apAe1hrJ4VZqi0u1uAdTTGnAPRZZ5POL4h7B8gUz8U4WcE9CX3c-027php-33Y50A/exec"></iframe> 
   
<script>
    // १. Firebase Config (GitHub वर टाका)
const firebaseConfig = {
    apiKey: "AIzaSyBfDsCvNBb6SVhz0Z8P5p3s5jIGVZQYTPc",
    authDomain: "kv-digital-society.firebaseapp.com",
    projectId: "kv-digital-society",
    storageBucket: "kv-digital-society.firebasestorage.app",
    messagingSenderId: "524643551701",
    appId: "1:524643551701:web:4f32cc6dc24b9bb48c155c",
    measurementId: "G-QPNLYDJ7FZ"
};
    
    // Firebase Initialize
    firebase.initializeApp(firebaseConfig);
    const messaging = firebase.messaging();

    // २. आयफ्रेम कडून (Google Script कडून) येणारा मेसेज ऐकणे
    window.addEventListener('message', function(event) {
        if (event.data === 'REQUEST_NOTIF_PERMISSION') {
            console.log("🚀 Permission request received from Iframe");
            askPermission();
        }
    });

    // ३. परवानगी मागण्याचे मुख्य फंक्शन
    function askPermission() {
        Notification.requestPermission().then((permission) => {
            if (permission === 'granted') {
                console.log("✅ Permission Granted on GitHub!");
                
                // टोकन मिळवा
                messaging.getToken({ 
                    vapidKey: 'BG1NQMsKIT6Kf4zKRPazypj-q-CGL0XUqzVwDp6EGmsVxR5W7e1T91Bi3rRcbN8oGCUbcEJqpW23BSrOXJskOCQ' 
                })
                .then((token) => {
                    console.log("✅ Generated Token:", token);
                    // हे टोकन आयफ्रेमच्या आत असलेल्या Google Script ला परत पाठवा
                    const iframe = document.querySelector('iframe');
                    iframe.contentWindow.postMessage({
                        type: 'SAVE_TOKEN', 
                        token: token
                    }, '*');
                })
                .catch(err => console.error("❌ Token Error:", err));
            } else {
                alert("❌ तुम्ही नोटिफिकेशन नाकारले आहे.");
            }
        });
    }

    // ४. Service Worker Registration
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('✅ SW Registered:', reg.scope))
            .catch(err => console.error('❌ SW Failed:', err));
        });
    }

    const iframe = document.querySelector('iframe');
    iframe.onload = () => console.log('✅ App Loaded inside Iframe.');
</script>
</body>
</html>
