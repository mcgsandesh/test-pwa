<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KV Society PWA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2196F3">
    <style>
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; background-color: #ffffff; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
    <!-- Firebase SDK (GitHub स्तरावर लोड करणे आवश्यक आहे) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-messaging.js"></script>
</head>
<body>

    <!-- २. नोटिफिकेशन सुरू करण्याचे बटण (आयफ्रेमच्या वर किंवा खाली कोठेही) -->
<div id="notif-bar" style="background:#2196F3; color:white; text-align:center; padding:10px; font-family:sans-serif; display:none;">
  🔔 सोसायटी अपडेट्स मिळवण्यासाठी 2 <button onclick="askNotification()" style="padding:5px 10px; border-radius:4px; border:none; cursor:pointer; font-weight:bold;">सुरू करा</button>
</div>
    
   <iframe src="https://script.google.com/macros/s/AKfycbxz_apAe1hrJ4VZqi0u1uAdTTGnAPRZZ5POL4h7B8gUz8U4WcE9CX3c-027php-33Y50A/exec"></iframe> 


    
<script>
  // १. सोसायटी टोकन स्टोअर करण्यासाठी ग्लोबल व्हेरिएबल
  let globalSocietyToken = null;

  // २. आयफ्रेममधून येणारा मेसेज ऐकण्यासाठी 'Listener'
  window.addEventListener("message", function(event) {
    // सुरक्षा तपासणी: फक्त गुगल स्क्रिप्टच्या डोमेनवरून आलेले मेसेजेस स्वीकारा
    if (!event.origin.includes('googleusercontent.com')) {
      return; 
    }

    console.log("📩 [GitHub Debug] Iframe कडून मेसेज आला!");
    console.log("🌐 [GitHub Debug] Origin:", event.origin);
    
    // मेसेज डेटा तपासा
    if (event.data && event.data.type === 'SOCIETY_APP_LOGIN') {
      globalSocietyToken = event.data.token;
      console.log("🎯 [GitHub Debug] Society Token यशस्वीरित्या सेव्ह झाला:", globalSocietyToken);
    }
  }, false);

  // ३. तुमचा फायरबेस कॉन्फिग (जसा आहे तसाच ठेवा)
  var firebaseConfig = {
    apiKey: "AIzaSyBfDsCvNBb6SVhz0Z8P5p3s5jIGVZQYTPc",
    authDomain: "kv-digital-society.firebaseapp.com",
    projectId: "kv-digital-society",
    storageBucket: "kv-digital-society.firebasestorage.app",
    messagingSenderId: "524643551701",
    appId: "1:524643551701:web:4f32cc6dc24b9bb48c155c",
    measurementId: "G-QPNLYDJ7FZ"
  };
  firebase.initializeApp(firebaseConfig);
  const messaging = firebase.messaging();

    function askNotification() {
  // १. नोटिफिकेशन परवानगी मागणे
  Notification.requestPermission().then(permission => {
    if (permission === 'granted') {
      
      // २. सर्विस वर्कर नोंदणी
      navigator.serviceWorker.register('firebase-messaging-sw.js')
      .then((registration) => {
        console.log("✅ Service Worker Registered");

        // ३. Firebase कडून FCM Token मिळवणे
        messaging.getToken({ 
                vapidKey: 'BG1NQMsKIT6Kf4zKRPazypj-q-CGL0XUqzVwDp6EGmsVxR5W7e1T91Bi3rRcbN8oGCUbcEJqpW23BSrOXJskOCQ', 
          serviceWorkerRegistration: registration 
        })
        .then(fcmToken => {
          console.log("🔑 FCM Token मिळाला: ", fcmToken);
          console.log("🚀 आता Apps Script कडे रिडायरेक्ट करत आहे...");

          // ४. Apps Script ची Deployment URL
            const scriptURL = "https://script.google.com/macros/s/AKfycbxz_apAe1hrJ4VZqi0u1uAdTTGnAPRZZ5POL4h7B8gUz8U4WcE9CX3c-027php-33Y50A/exec";
          
          /**
           * महत्वाचा बदल: 
           * आपण आता fetch न करता युजरला थेट Apps Script कडे पाठवत आहोत.
           * सोबत action=registerFCM आणि fcmToken हे पॅरामीटर्स जोडले आहेत.
           */
          const redirectURL = `${scriptURL}?action=registerFCM&fcmToken=${fcmToken}`;
          
          // रिडायरेक्ट सुरू करा
          window.location.href = redirectURL;
        })
        .catch(err => {
          console.error("❌ Token Error:", err);
          alert("टोकन मिळवण्यात अडचण आली: " + err.message);
        });
      })
      .catch(err => {
        console.error("❌ SW Registration Error:", err);
      });
    } else {
      alert("नोटिफिकेशनसाठी परवानगी नाकारली आहे.");
    }
  });
}

  if (Notification.permission !== 'granted') {
    document.getElementById('notif-bar').style.display = 'block';
  }
</script>
</body>
</html>
