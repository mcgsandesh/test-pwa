<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KV Society PWA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2196F3">
    <style>
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; background-color: #ffffff; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <iframe src="https://script.google.com/macros/s/AKfycbxz_apAe1hrJ4VZqi0u1uAdTTGnAPRZZ5POL4h7B8gUz8U4WcE9CX3c-027php-33Y50A/exec"></iframe>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
            .then(reg => {
                // यशस्वीरित्या रजिस्टर झाल्यावर
                console.log('✅ PWA: Service Worker Registered Successfully! Scope:', reg.scope);
            })
            .catch(err => {
                // जर काही एरर आला तर
                console.error('❌ PWA: Service Worker Registration Failed:', err);
            });
        });
    } else {
        console.warn('⚠️ PWA: Service Worker is not supported in this browser.');
    }

    // Iframe लोड झाला की नाही हे पाहण्यासाठी
    const iframe = document.querySelector('iframe');
    iframe.onload = function() {
        console.log('✅ App: Google Script Web App loaded inside Iframe.');
    };
    iframe.onerror = function() {
        console.error('❌ App: Failed to load Google Script Iframe.');
    };
</script>
</body>
</html>
